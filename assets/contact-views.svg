<svg xmlns="http://www.w3.org/2000/svg" width="240" height="64" viewBox="0 0 240 64" role="img" aria-label="SIGNAL Visitor telemetry">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity=".1"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" width="238" height="62" rx="18" fill="url(#bg)" stroke="url(#edge)" stroke-width="2"/>
  <rect x="14" y="14" width="36" height="36" rx="12" fill="#a78bfa" fill-opacity=".13" stroke="#a78bfa" stroke-opacity=".75"/>
  <text x="32" y="38" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" fill="#f8fafc">++</text>
  <text x="60" y="27" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="800" letter-spacing="1.1" fill="#a78bfa">SIGNAL</text>
  <text x="60" y="45" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="750" fill="#f8fafc">Visitor telemetry</text>
  <circle cx="212" cy="18" r="2" fill="#a78bfa">
    <animate attributeName="opacity" values=".25;1;.25" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <line x1="-90" y1="7" x2="40" y2="7" stroke="url(#scan)" stroke-width="2" filter="url(#glow)">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="360 0" dur="3.8s" repeatCount="indefinite"/>
  </line>
</svg>
